<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letter to Our Guests - Odelia & Donggyu</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #e8dcc8;
            background-image: url('images/letter_bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .letter-image {
            width: 90%;
            display: block;
            margin: 2.5rem auto;
        }
        .letter-buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 0.4rem;
            margin-top: -1.9rem;
            margin-bottom: 1rem;
        }
        .letter-next {
            display: inline-block;
            position: relative;
            padding: 7px 18px;
            background: transparent;
            color: #3a3a3a;
            text-decoration: none;
            border: none;
            font-size: 1.3rem;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            z-index: 0;
            animation: heartbeat 1.5s ease-in-out 5s infinite;
        }
        .letter-next::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 60%;
            transform: translate(-50%, -50%);
            width: 700%;
            height: 2100%;
            background-image: url('images/button_letter1.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            z-index: -1;
            pointer-events: none;
        }
        .letter-next:hover {
            transform: translateY(-2px);
        }
        .letter-back {
            display: inline-block;
            padding: 7px 18px;
            background: transparent;
            color: #3a3a3a;
            text-decoration: none;
            border: none;
            font-size: 0.975rem;
            font-weight: bold;
            letter-spacing: 1px;
            font-family: 'Playfair Display', serif;
            transition: all 0.3s ease;
            animation: heartbeat 1.5s ease-in-out 5s infinite;
        }
        .letter-back:hover {
            transform: translateY(-2px);
        }
        @media (max-width: 600px) {
            .letter-buttons {
                flex-direction: column;
                padding: 1.5rem 1rem;
            }
            .letter-next {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <img src="images/letter_f.png" alt="Letter to Our Guests" class="letter-image">
    <div class="letter-buttons">
        <a href="story.html" class="letter-back">Back</a>
        <a href="rsvp.html" class="letter-next">Will you join us?</a>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
