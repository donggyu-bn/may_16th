<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Story - Odelia & Donggyu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #e8dcc8;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
        }
        .video-wrapper {
            width: 98vw;
            max-width: 1400px;
            max-height: 91vh;
            border: 4px solid rgba(200, 200, 200, 0.4);
        }
        .video-wrapper video {
            width: 100%;
            height: 100%;
            display: block;
            border: none;
            outline: none;
            background-color: #000;
            clip-path: inset(0 1px 0 0);
        }
        @keyframes heartbeat {
            0%   { scale: 1; }
            8%   { scale: 1.08; }
            16%  { scale: 1; }
            24%  { scale: 1.05; }
            32%  { scale: 1; }
            100% { scale: 1; }
        }
        .next-btn {
            display: inline-block;
            position: relative;
            z-index: 0;
            padding: 12px 40px;
            background: transparent;
            color: #1a1a1a;
            text-decoration: none;
            font-weight: bold;
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            letter-spacing: 2px;
            border: none;
            transition: all 0.3s ease;
            animation: heartbeat 1.5s ease-in-out 5s infinite;
        }
        .next-btn:hover {
            transform: translateY(-2px);
        }
        .story-nav {
            display: flex;
            gap: 3rem;
            align-items: center;
        }
        @media (max-width: 600px) {
            .video-wrapper {
                width: 98vw;
            }
            .story-nav {
                gap: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <video id="storyVideo" autoplay playsinline>
            <source src="images/final_vid.mp4" type="video/mp4">
        </video>
    </div>

    <div class="story-nav">
        <a href="letter.html" class="next-btn">Next</a>
    </div>

    <script>
        document.getElementById('storyVideo').addEventListener('ended', function () {
            window.location.href = 'letter.html';
        });
    </script>
</body>
</html>
