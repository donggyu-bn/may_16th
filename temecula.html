<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temecula - Odelia & Donggyu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #e8dcc8;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem 2rem;
        }
        .temecula-frame {
            width: 100%;
            max-width: 1000px;
            flex: 1;
            min-height: 0;
            border: none;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            display: block;
        }
        .temecula-nav {
            margin-top: 2rem;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        @keyframes heartbeat {
            0%   { scale: 1; }
            8%   { scale: 1.08; }
            16%  { scale: 1; }
            24%  { scale: 1.05; }
            32%  { scale: 1; }
            100% { scale: 1; }
        }
        .temecula-nav a {
            display: inline-block;
            position: relative;
            z-index: 0;
            padding: 12px 30px;
            background: transparent;
            border: none;
            text-decoration: none;
            font-weight: bold;
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            letter-spacing: 1px;
            color: #3a3a3a;
            transition: all 0.3s ease;
            animation: heartbeat 1.5s ease-in-out 5s infinite;
        }
        .temecula-nav a:hover {
            transform: translateY(-2px);
        }
        @media (max-width: 1000px) {
            body { padding: 0.5rem; }
            .temecula-nav { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>
    <iframe
        class="temecula-frame"
        src="https://www.visittemeculavalley.com/"
        title="Visit Temecula Valley"
        frameborder="0">
    </iframe>

    <nav class="temecula-nav">
        <a href="menu.html" class="nav-back">Directories</a>
    </nav>
</body>
</html>
